<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emotion Detector</title>
    <style>
        body {
            font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
            max-width: 700px;
            margin: 60px auto;
            padding: 0 20px;
            background: #ffffff;
            color: #1f2328;
        }
        h1 { font-size: 1.6rem; margin-bottom: 8px; }
        p.subtitle { color: #57606a; margin-bottom: 24px; }
        textarea {
            width: 100%;
            height: 110px;
            padding: 10px;
            font-size: 15px;
            border: 1px solid #e5e7eb;
            border-radius: 4px;
            resize: vertical;
            box-sizing: border-box;
        }
        button {
            margin-top: 12px;
            padding: 9px 22px;
            font-size: 15px;
            background: #3b82d4;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover { background: #2d6bbf; }
        #output {
            margin-top: 24px;
            padding: 16px;
            background: #f7f8fa;
            border: 1px solid #e5e7eb;
            border-radius: 4px;
            min-height: 50px;
            font-size: 15px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <h1>Emotion Detector</h1>
    <p class="subtitle">Analyse the emotions expressed in any text statement.</p>
    <textarea id="textToAnalyze" placeholder="Enter text to analyse…"></textarea>
    <br>
    <button onclick="analyzeEmotion()">Run Analysis</button>
    <div id="output">Your results will appear here.</div>

    <script src="/static/mywebscript.js"></script>
</body>
</html>
